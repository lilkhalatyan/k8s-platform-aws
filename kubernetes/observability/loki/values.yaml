# Loki Helm values
# Chart: https://github.com/grafana/helm-charts/tree/main/charts/loki-stack

loki:
  enabled: true
  persistence:
    enabled: false  # Use emptyDir for cost savings (dev environment)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - docker: {}
        - match:
            selector: '{namespace="microservices"}'
            stages:
              - json:
                  expressions:
                    level: level
                    service: service
              - labels:
                  level:
                  service:
