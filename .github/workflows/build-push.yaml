name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "apps/**"

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, order-service, notification-service]

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/k8s-platform-${{ matrix.service }}:$IMAGE_TAG \
                       -t $ECR_REGISTRY/k8s-platform-${{ matrix.service }}:latest \
                       apps/${{ matrix.service }}/
          docker push $ECR_REGISTRY/k8s-platform-${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/k8s-platform-${{ matrix.service }}:latest

      - name: Update Kubernetes manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SERVICE=${{ matrix.service }}
          IMAGE_PLACEHOLDER=$(echo ${SERVICE} | tr '-' '_' | tr '[:lower:]' '[:upper:]')_IMAGE
          sed -i "s|${IMAGE_PLACEHOLDER}:latest|${ECR_REGISTRY}/k8s-platform-${SERVICE}:${IMAGE_TAG}|g" \
            kubernetes/apps/${SERVICE}/deployment.yaml
